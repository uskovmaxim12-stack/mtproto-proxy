name: Update MTProto Proxy List

on:
  schedule:
    # Запускается каждые 4 часа
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run proxy collector script
        run: python main.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add proxy_ru.txt
          # Коммитим только если файл действительно изменился
          git diff --quiet && git diff --staged --quiet || git commit -m "Автообновление списка прокси"
          git push
